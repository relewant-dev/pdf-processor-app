name: Frontend CI & Release

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

env:
  IMAGE_NAME: ghcr.io/relewant-dev/pdf-processor-app

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Conventional Commits
        if: github.event_name == 'pull_request'
        uses: wagoid/commitlint-github-action@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build

  release:
    # if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure initial tag v0.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! git rev-parse "v0.0.0" >/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag v0.0.0
            git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} v0.0.0
          fi

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Trigger pdf-processor-infra deployment
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.INFRA_REPO_PAT }}
          repository: relewant-dev/pdf-processor-infra
          event-type: frontend-deployed
          client-payload: '{"image":"${{ env.IMAGE_NAME }}","tag":"${{ github.sha }}"}'